<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatterlands Director</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Shatterlands Global Director</h1>
        <div id="controls">
            <span>Ticks:</span>
            <input type="range" id="tickSlider" min="1" max="100" value="1" oninput="document.getElementById('tickValue').innerText = this.value">
            <span id="tickValue">1</span>
            <button id="runBtn">▶ Run Simulation</button>
            <div id="status">Loading...</div>
        </div>
    </header>

    <main>
        <div id="left-panel" class="glass-panel">
            <h3>Mini-Map</h3>
            <p class="caption">Click to set Main Viewport</p>
            <canvas id="minimap" width="280" height="230"></canvas>
            
            <div id="hex-details">
                <h3>📍 Hex Detail</h3>
                <div id="hex-content">Click a hex in the Main Map.</div>
            </div>
            
            <div id="cluster-details">
                <h3>🧩 Micro-Cluster Map</h3>
                <p class="caption">Double-click a hex in the Main Map.</p>
                <canvas id="microcanvas" width="280" height="230"></canvas>
                <div id="cluster-content"></div>
            </div>
        </div>

        <div id="center-panel" class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
                <h3>🌐 Main Viewport</h3>
                <div>
                    <strong style="color: var(--text-muted); font-size: 0.9rem; margin-right: 10px;">Overlay:</strong>
                    <select id="overlaySelect" onchange="drawMainMap()">
                        <option value="biome">Terrain / Biome</option>
                        <option value="ecology_p1">Ecology (Flora)</option>
                        <option value="ecology_p2">Ecology (Prey)</option>
                        <option value="ecology_p3">Ecology (Predators)</option>
                        <option value="faction">Political (Factions)</option>
                        <option value="population">Population Heatmap</option>
                        <option value="wealth">Wealth Heatmap</option>
                        <option value="weather">Weather & Chaos Storms</option>
                    </select>
                </div>
            </div>
            <p class="caption" style="margin-bottom: 15px;">Click: Hex | Double-Click: Cluster | Drag: Pan</p>
            <canvas id="mainmap"></canvas>
        </div>
    </main>

    <footer class="glass-panel">
        <h3 style="margin-bottom: 10px;">📜 Event Logs</h3>
        <div id="logs"></div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
